<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
<title>Ball Finger Smash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Exo+2:wght@500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
:root{--font-display:'Bricolage Grotesque',sans-serif;--font-body:'Exo 2',sans-serif;--bg:#12090a;--panel:rgba(24,10,13,.76);--line:rgba(255,187,107,.32);--text:#fff4df;--muted:#ffce8b;--accent:#ff9f43;--danger:#ff6d6d;--ok:#88ff9d}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%}
body{overflow:hidden;touch-action:none;background:radial-gradient(circle at 18% 10%,#5b232b,transparent 34%),radial-gradient(circle at 78% 14%,#4b1a22,transparent 30%),#080406;color:var(--text);font-family:var(--font-body)}
#game{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
video{position:absolute;right:.7rem;top:.7rem;width:150px;height:95px;object-fit:cover;border-radius:.7rem;border:1px solid var(--line);transform:scaleX(-1);z-index:4;background:#000;opacity:.9;display:none}
.overlay{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:space-between;padding:.8rem;pointer-events:none}
.hud{margin-right:166px;display:grid;grid-template-columns:repeat(4,minmax(72px,1fr));gap:.45rem;background:var(--panel);border:1px solid var(--line);border-radius:.8rem;padding:.45rem;pointer-events:auto}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,215,167,.16);border-radius:.6rem;padding:.35rem;text-align:center}
.label{font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}.value{font-weight:700;font-size:1rem}
.actions{display:flex;gap:.45rem;flex-wrap:wrap;justify-content:flex-end;pointer-events:auto}
button{min-height:42px;padding:.55rem .95rem;border-radius:999px;border:1px solid var(--line);background:rgba(255,159,67,.14);color:var(--text);font:inherit;cursor:pointer}
button:hover{background:rgba(255,159,67,.23)}.primary{background:var(--accent);color:#321107;border-color:transparent}
.msg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:7;background:rgba(26,8,11,.88);border:1px solid var(--line);border-radius:.8rem;padding:1rem;max-width:min(90vw,34rem);text-align:center}
.msg[hidden]{display:none}
.modePicker{position:absolute;inset:0;z-index:8;background:rgba(10,4,6,.72);display:flex;align-items:center;justify-content:center;padding:1rem}
.modeCard{width:min(94vw,560px);background:rgba(24,9,12,.92);border:1px solid var(--line);border-radius:.9rem;padding:1rem;text-align:center}
.modeButtons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.7rem;margin-top:.7rem}
@media(max-width:760px){video{width:120px;height:78px}.hud{margin-right:0;grid-template-columns:repeat(2,minmax(0,1fr))}.modeButtons{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<video id="vid" playsinline muted></video>
<div class="overlay">
  <section class="hud">
    <div class="stat"><div class="label">Score</div><div id="score" class="value">0</div></div>
    <div class="stat"><div class="label">Best</div><div id="best" class="value">0</div></div>
    <div class="stat"><div class="label">Streak</div><div id="streak" class="value">0</div></div>
    <div class="stat"><div class="label">Status</div><div id="status" class="value">Mode</div></div>
    <div class="stat"><div class="label">Mode</div><div id="mode" class="value">None</div></div>
    <div class="stat"><div class="label">Music</div><div id="musicState" class="value">On</div></div>
    <div class="stat"><div class="label">Fruit</div><div id="fruitCount" class="value">0</div></div>
    <div class="stat"><div class="label">Slices</div><div id="sliceCount" class="value">0</div></div>
  </section>
  <section class="actions">
    <button id="restartBtn" class="primary" type="button">Restart</button>
    <button id="musicBtn" type="button">Music: On</button>
    <button id="fullscreenBtn" type="button">Fullscreen</button>
    <button id="homeBtn" type="button">Home</button>
  </section>
</div>
<div id="modePicker" class="modePicker">
  <section class="modeCard">
    <h2>Select Control Mode</h2>
    <p>Choose how you want to play Fruit Finger Smash.</p>
    <div class="modeButtons">
      <button id="phoneModeBtn" class="primary" type="button">Phone Mode: Touch</button>
      <button id="laptopModeBtn" type="button">Laptop Mode: Finger Tracking</button>
    </div>
  </section>
</div>
<div id="message" class="msg"><h2>Pick a mode</h2><p>Choose phone touch or laptop finger tracking.</p></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),vid=document.getElementById('vid');
const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),streakEl=document.getElementById('streak'),statusEl=document.getElementById('status'),modeEl=document.getElementById('mode'),musicStateEl=document.getElementById('musicState'),fruitCountEl=document.getElementById('fruitCount'),sliceCountEl=document.getElementById('sliceCount'),messageEl=document.getElementById('message'),modePicker=document.getElementById('modePicker');
const restartBtn=document.getElementById('restartBtn'),musicBtn=document.getElementById('musicBtn'),fullscreenBtn=document.getElementById('fullscreenBtn'),homeBtn=document.getElementById('homeBtn'),phoneModeBtn=document.getElementById('phoneModeBtn'),laptopModeBtn=document.getElementById('laptopModeBtn');
let cw=0,ch=0,lastTime=0,lastSpawn=0,score=0,best=0,streak=0,sliceCount=0,started=false,musicEnabled=true,musicActive=false,activePointerId=null,controlMode=null,handVisible=false;
let fruits=[],particles=[],trail=[];
const pointer={x:0,y:0,prevX:0,prevY:0,active:false,speed:0};
let hands=null,camera=null;
let bgMusic=null,queuedTracks=[],currentTrackUrl='';
const chillTracks=['https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3'];

function resize(){cw=canvas.width=innerWidth;ch=canvas.height=innerHeight;}
function updateHud(){scoreEl.textContent=String(score);bestEl.textContent=String(best);streakEl.textContent=String(streak);fruitCountEl.textContent=String(fruits.length);sliceCountEl.textContent=String(sliceCount);statusEl.textContent=started?(controlMode==='laptop'?(handVisible?'Tracking':'Searching'):'Touch'):'Ready';modeEl.textContent=controlMode?(controlMode==='phone'?'Phone':'Laptop'):'None';musicStateEl.textContent=musicEnabled?'On':'Off';}
function showMessage(t,x){messageEl.hidden=false;messageEl.innerHTML='<h2>'+t+'</h2><p>'+x+'</p>';}function hideMessage(){if(started)messageEl.hidden=true;}

function shuffleTracks(){queuedTracks=[...chillTracks].sort(()=>Math.random()-.5).filter(t=>t!==currentTrackUrl);if(!queuedTracks.length)queuedTracks=[...chillTracks];}
function playNextTrack(){if(!musicEnabled||!musicActive)return;if(!queuedTracks.length)shuffleTracks();currentTrackUrl=queuedTracks.pop();if(!bgMusic){bgMusic=new Audio();bgMusic.preload='none';bgMusic.volume=.2;bgMusic.addEventListener('ended',playNextTrack);bgMusic.addEventListener('error',playNextTrack);}bgMusic.src=currentTrackUrl;bgMusic.play().catch(()=>{});}
function setMusicActive(active){musicActive=active;if(!musicEnabled){if(bgMusic)bgMusic.pause();return;}if(!active){if(bgMusic)bgMusic.pause();return;}if(bgMusic&&bgMusic.src)bgMusic.play().catch(()=>{});else playNextTrack();}
function toggleMusic(){musicEnabled=!musicEnabled;musicBtn.textContent=musicEnabled?'Music: On':'Music: Off';updateHud();if(!musicEnabled&&bgMusic)bgMusic.pause();if(musicEnabled&&started)setMusicActive(true);}

function spawnFruit(){const r=Math.random()*12+16;fruits.push({x:Math.random()*(cw-80)+40,y:ch+30,vx:(Math.random()-.5)*220,vy:-(520+Math.random()*180),r,rot:Math.random()*Math.PI*2,spin:(Math.random()-.5)*4,color:['#ff6959','#ffb347','#ffd95f','#74dd7b','#67c4ff'][Math.floor(Math.random()*5)]});}
function burst(x,y,color,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*380,vy:(Math.random()-.5)*330,size:Math.random()*4+2,life:Math.random()*.5+.25,color});}
function lineHitsCircle(x1,y1,x2,y2,cx,cy,r){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(l2===0)return Math.hypot(cx-x1,cy-y1)<=r;let t=((cx-x1)*dx+(cy-y1)*dy)/l2;t=Math.max(0,Math.min(1,t));const px=x1+t*dx,py=y1+t*dy;return Math.hypot(cx-px,cy-py)<=r;}

function drawBackground(t){const g=ctx.createLinearGradient(0,0,0,ch);g.addColorStop(0,'#2a1215');g.addColorStop(1,'#090406');ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch);for(let i=0;i<30;i++){const x=(i*137+t*.02)%cw,y=(i*91+t*.01)%ch;ctx.fillStyle='rgba(255,190,120,.03)';ctx.beginPath();ctx.arc(x,y,2.2,0,Math.PI*2);ctx.fill();}}
function drawFruit(f){ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.rot);ctx.fillStyle=f.color;ctx.beginPath();ctx.arc(0,0,f.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.26)';ctx.beginPath();ctx.arc(-f.r*.28,-f.r*.28,f.r*.23,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawTrail(){if(trail.length<2)return;ctx.save();ctx.lineCap='round';for(let i=1;i<trail.length;i++){const p1=trail[i-1],p2=trail[i],a=i/trail.length;ctx.strokeStyle='rgba(255,243,215,'+(0.12+a*.72).toFixed(3)+')';ctx.lineWidth=2+a*8;ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}ctx.restore();}
function drawParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;if(p.life<=0){particles.splice(i,1);continue;}p.vy+=640*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;ctx.globalAlpha=Math.max(0,p.life*1.8);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*Math.max(.2,p.life),0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}

function sliceCheck(){if(trail.length<2||!pointer.active)return;const p1=trail[trail.length-2],p2=trail[trail.length-1];if(pointer.speed<220)return;for(let i=fruits.length-1;i>=0;i--){const f=fruits[i];if(!lineHitsCircle(p1.x,p1.y,p2.x,p2.y,f.x,f.y,f.r+8))continue;fruits.splice(i,1);score+=10;streak+=1;sliceCount+=1;burst(f.x,f.y,f.color,18);if(score>best)best=score;updateHud();}}

function updatePointer(x,y,now){if(!pointer.active){pointer.prevX=x;pointer.prevY=y;pointer.x=x;pointer.y=y;pointer.active=true;return;}const nx=pointer.x+(x-pointer.x)*.34,ny=pointer.y+(y-pointer.y)*.34;const dx=nx-pointer.x,dy=ny-pointer.y;pointer.speed=Math.hypot(dx,dy)*62;pointer.prevX=pointer.x;pointer.prevY=pointer.y;pointer.x=nx;pointer.y=ny;trail.push({x:pointer.x,y:pointer.y,t:now});while(trail.length&&now-trail[0].t>130)trail.shift();}
function releasePointer(){pointer.active=false;trail=[];activePointerId=null;}

function resetGame(){score=0;streak=0;sliceCount=0;started=false;handVisible=false;fruits=[];particles=[];trail=[];releasePointer();lastSpawn=0;updateHud();if(controlMode==='laptop')showMessage('Show your hand','Move your index finger to slice fruits.');else if(controlMode==='phone')showMessage('Touch to slice','Drag your finger on screen to slice fruits.');else showMessage('Pick a mode','Choose phone touch or laptop finger tracking.');setMusicActive(false);}

function startSession(){if(started)return;started=true;hideMessage();setMusicActive(true);updateHud();}

async function startLaptopTracking(){try{if(!hands){hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.6,minTrackingConfidence:.6});hands.onResults(results=>{if(controlMode!=='laptop')return;if(!results.multiHandLandmarks||!results.multiHandLandmarks.length){handVisible=false;updateHud();return;}const tip=results.multiHandLandmarks[0][8];handVisible=true;updatePointer((1-tip.x)*cw,tip.y*ch,performance.now());startSession();});}
if(!camera){camera=new Camera(vid,{onFrame:async()=>{if(controlMode==='laptop')await hands.send({image:vid});},width:640,height:480});}
vid.style.display='block';await camera.start();
}catch(_e){controlMode=null;modePicker.style.display='flex';vid.style.display='none';showMessage('Camera blocked','Allow camera access and choose Laptop mode again.');updateHud();}}

async function switchMode(mode){controlMode=mode;modePicker.style.display='none';if(mode==='phone'){handVisible=false;if(camera)camera.stop();vid.style.display='none';}else{await startLaptopTracking();}resetGame();}

function tick(t){const dt=Math.min(.04,(t-lastTime)/1000||.016);lastTime=t;drawBackground(t);if(started){const gap=Math.max(420,900-score*.6);if(t-lastSpawn>gap){spawnFruit();lastSpawn=t;}for(let i=fruits.length-1;i>=0;i--){const f=fruits[i];f.vy+=980*dt;f.x+=f.vx*dt;f.y+=f.vy*dt;f.rot+=f.spin*dt;drawFruit(f);if(f.y-f.r>ch+20){fruits.splice(i,1);score=Math.max(0,score-5);streak=0;}}sliceCheck();}else{for(const f of fruits)drawFruit(f);}drawTrail();drawParticles(dt);if(!started&&controlMode==='laptop'&&!handVisible)showMessage('Show your hand','Move your index finger to slice fruits.');requestAnimationFrame(tick);updateHud();}

canvas.addEventListener('pointerdown',e=>{if(controlMode!=='phone')return;if(activePointerId!==null&&activePointerId!==e.pointerId)return;activePointerId=e.pointerId;startSession();updatePointer(e.clientX,e.clientY,performance.now());if(e.pointerType==='touch')e.preventDefault();},{passive:false});
canvas.addEventListener('pointermove',e=>{if(controlMode!=='phone')return;if(activePointerId!==null&&e.pointerId!==activePointerId)return;if(!started)return;updatePointer(e.clientX,e.clientY,performance.now());if(e.pointerType==='touch')e.preventDefault();},{passive:false});
canvas.addEventListener('pointerup',e=>{if(activePointerId!==null&&e.pointerId!==activePointerId)return;releasePointer();},{passive:true});
canvas.addEventListener('pointercancel',e=>{if(activePointerId!==null&&e.pointerId!==activePointerId)return;releasePointer();},{passive:true});
canvas.addEventListener('touchstart',e=>{if(controlMode!=='phone')return;const t=e.touches[0];if(!t)return;startSession();updatePointer(t.clientX,t.clientY,performance.now());e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{if(controlMode!=='phone'||!started)return;const t=e.touches[0];if(!t)return;updatePointer(t.clientX,t.clientY,performance.now());e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',releasePointer,{passive:true});
canvas.addEventListener('touchcancel',releasePointer,{passive:true});

phoneModeBtn.addEventListener('click',()=>{switchMode('phone');});
laptopModeBtn.addEventListener('click',()=>{switchMode('laptop');});
restartBtn.addEventListener('click',resetGame);
musicBtn.addEventListener('click',toggleMusic);
fullscreenBtn.addEventListener('click',()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});});
homeBtn.addEventListener('click',()=>{location.href='index.html';});
addEventListener('resize',resize);

resize();updateHud();requestAnimationFrame(tick);
</script>
</body>
</html>
