<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
<title>ROCKET-RUSH</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
:root{--font-display:'Cabinet Grotesk','Inter',sans-serif;--font-body:'Satoshi','Inter',sans-serif;--bg:#050814;--surface:rgba(10,18,34,.72);--surface2:rgba(19,30,54,.76);--line:rgba(128,181,255,.18);--text:#eef4ff;--muted:#9fb4d8;--primary:#7bc2ff}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0}body{overflow:hidden;background:radial-gradient(circle at top,rgba(68,122,255,.12),transparent 35%),var(--bg);color:var(--text);font-family:var(--font-body)}
#game{position:absolute;inset:0;width:100%;height:100%}video{position:absolute;right:.8rem;bottom:.8rem;width:180px;height:102px;object-fit:cover;border-radius:.8rem;border:1px solid var(--line);transform:scaleX(-1);z-index:3;display:none}
.overlay{position:absolute;inset:0;z-index:4;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:1rem;gap:.6rem}
.row{display:flex;justify-content:space-between;gap:.6rem;flex-wrap:wrap}.panel{pointer-events:auto;background:var(--surface);border:1px solid var(--line);border-radius:.8rem;padding:.8rem}
.brand{flex:1 1 100%;display:flex;gap:.7rem;align-items:center}.brand img{width:42px;height:42px;border-radius:.6rem;border:1px solid rgba(255,255,255,.2)}
.eyebrow{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}h1{margin:.1rem 0;font-size:1.5rem;font-family:var(--font-display)}.meta{margin:0;color:var(--muted);font-size:.86rem}
.hud{display:grid;grid-template-columns:repeat(4,minmax(64px,1fr));gap:.4rem;min-width:min(100%,560px)}.stat{padding:.35rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:.6rem;text-align:center}
.label{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.value{font-size:1rem;font-weight:700}
.actions{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end}button{min-height:42px;padding:.55rem .95rem;border-radius:999px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font:inherit;cursor:pointer}button:hover{background:rgba(123,194,255,.16)}.primary{background:var(--primary);color:#04101f;border-color:transparent}
.centerMessage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;background:rgba(8,14,28,.86);border:1px solid var(--line);border-radius:.8rem;padding:1rem;max-width:min(92vw,34rem);text-align:center}.centerMessage[hidden]{display:none}.centerMessage h2{margin:0 0 .4rem}
.modePicker{position:absolute;inset:0;z-index:7;background:rgba(2,8,16,.72);display:flex;align-items:center;justify-content:center;padding:1rem}.modeCard{width:min(94vw,560px);background:rgba(8,16,30,.9);border:1px solid var(--line);border-radius:.8rem;padding:1rem;text-align:center}.modeButtons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.7rem;margin-top:.7rem}
@media(max-width:760px){.hud{grid-template-columns:repeat(2,minmax(0,1fr))}.modeButtons{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<video id="vid" playsinline muted></video>
<div class="overlay"><div class="row"><section class="panel brand"><img src="logo.png" alt="CreativeCAT logo"/><div><div class="eyebrow">CreativeCAT by Vansh Bhavsar</div><h1>ROCKET-RUSH</h1><p class="meta">Phone touch or laptop finger tracking. Auto-fire and aliens enabled.</p></div></section><section class="panel hud"><div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div><div class="stat"><div class="label">Lives</div><div class="value" id="lives">3</div></div><div class="stat"><div class="label">Level</div><div class="value" id="level">1</div></div><div class="stat"><div class="label">Status</div><div class="value" id="status">Mode</div></div><div class="stat"><div class="label">Shield</div><div class="value" id="shield">Off</div></div><div class="stat"><div class="label">Boost</div><div class="value" id="boost">Off</div></div><div class="stat"><div class="label">Mode</div><div class="value" id="mode">None</div></div><div class="stat"><div class="label">Music</div><div class="value" id="musicState">On</div></div></section></div><div class="row"><section class="panel actions"><button id="restartBtn" class="primary" type="button">Restart</button><button id="musicBtn" type="button">Music: On</button><button id="fullscreenBtn" type="button">Fullscreen</button><button id="homeBtn" type="button">Home</button></section></div></div>
<div id="modePicker" class="modePicker"><section class="modeCard"><h2>Select Control Mode</h2><p>Choose how you want to play.</p><div class="modeButtons"><button id="phoneModeBtn" class="primary">Phone Mode: Touch</button><button id="laptopModeBtn">Laptop Mode: Finger Tracking</button></div></section></div>
<div id="message" class="centerMessage"><h2>Pick a mode</h2><p>Choose phone touch or laptop finger tracking.</p></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),vid=document.getElementById('vid');
const scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),levelEl=document.getElementById('level'),statusEl=document.getElementById('status'),shieldEl=document.getElementById('shield'),boostEl=document.getElementById('boost'),modeEl=document.getElementById('mode'),musicStateEl=document.getElementById('musicState'),messageEl=document.getElementById('message'),modePicker=document.getElementById('modePicker');
const restartBtn=document.getElementById('restartBtn'),musicBtn=document.getElementById('musicBtn'),fullscreenBtn=document.getElementById('fullscreenBtn'),homeBtn=document.getElementById('homeBtn'),phoneModeBtn=document.getElementById('phoneModeBtn'),laptopModeBtn=document.getElementById('laptopModeBtn');
let cw=0,ch=0,score=0,lives=3,level=1,gameOver=false,started=false,handVisible=false,smoothedTargetX=null,controlMode=null,pointerActive=false,pointerX=0,gameTimeMs=0,lastTime=0,runStartMs=0,lastSpawn=0,lastEnemySpawn=0,lastPowerupSpawn=0,lastFireTime=0,spawnGap=950,enemySpawnGap=1700,powerupSpawnGap=8500,safeModeUntil=0,scoreBoostUntil=0;
let stars=[],particles=[],asteroids=[],enemies=[],bullets=[],powerups=[],hands=null,camera=null,bgMusic=null,musicEnabled=true,musicActive=false,queuedTracks=[],currentTrackUrl='';
const chillTracks=['https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3','https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3'];
const rocket={x:0,y:0,width:40,height:65,glow:0};
function resize(){cw=canvas.width=innerWidth;ch=canvas.height=innerHeight;if(!stars.length){for(let i=0;i<120;i++)stars.push({x:Math.random()*cw,y:Math.random()*ch,r:Math.random()*1.6+.3,speed:Math.random()*16+8,a:Math.random()*.7+.2});}rocket.x=Math.min(Math.max(38,rocket.x||cw/2),cw-38);rocket.y=ch-100;}
function shuffleTracks(){queuedTracks=[...chillTracks].sort(()=>Math.random()-.5).filter(t=>t!==currentTrackUrl);if(!queuedTracks.length)queuedTracks=[...chillTracks];}
function playNextTrack(){if(!musicEnabled||!musicActive)return;if(!queuedTracks.length)shuffleTracks();currentTrackUrl=queuedTracks.pop();if(!bgMusic){bgMusic=new Audio();bgMusic.preload='none';bgMusic.volume=.2;bgMusic.addEventListener('ended',playNextTrack);bgMusic.addEventListener('error',playNextTrack);}bgMusic.src=currentTrackUrl;bgMusic.play().catch(()=>{});}
function setMusicActive(active){musicActive=active;if(!musicEnabled){if(bgMusic)bgMusic.pause();return;}if(!active){if(bgMusic)bgMusic.pause();return;}if(bgMusic&&bgMusic.src)bgMusic.play().catch(()=>{});else playNextTrack();}
function updateMusicButton(){musicBtn.textContent=musicEnabled?'Music: On':'Music: Off';musicStateEl.textContent=musicEnabled?'On':'Off';}
function toggleMusic(){musicEnabled=!musicEnabled;updateMusicButton();if(!musicEnabled&&bgMusic)bgMusic.pause();if(musicEnabled&&started&&!gameOver)setMusicActive(true);}
function updateHud(){const sh=Math.max(0,safeModeUntil-gameTimeMs),bo=Math.max(0,scoreBoostUntil-gameTimeMs);scoreEl.textContent=String(score);livesEl.textContent=String(lives);levelEl.textContent=String(level);statusEl.textContent=gameOver?'Destroyed':started?(controlMode==='laptop'?(handVisible?'Tracking':'Searching'):'Touch'):'Ready';shieldEl.textContent=sh>0?(sh/1000).toFixed(1)+'s':'Off';boostEl.textContent=bo>0?'x2 '+(bo/1000).toFixed(1)+'s':'Off';modeEl.textContent=controlMode?(controlMode==='phone'?'Phone':'Laptop'):'None';}
function showMessage(t,x){messageEl.hidden=false;messageEl.innerHTML='<h2>'+t+'</h2><p>'+x+'</p>';}function hideMessage(){if(!gameOver&&started)messageEl.hidden=true;}
function getElapsedSeconds(){return runStartMs?Math.max(0,(gameTimeMs-runStartMs)/1000):0;}function getDifficultyScale(){const e=getElapsedSeconds();return 1+Math.min(1.7,level*.06+e*.0065);}function getEnemySpawnGap(){const e=getElapsedSeconds();return Math.max(700,Math.min(2600,2600-level*120-e*12));}function getPowerupSpawnGap(){const e=getElapsedSeconds();return Math.max(9000,Math.min(18000,9800+level*220+e*30));}
function addScore(p){score+=p*(gameTimeMs<scoreBoostUntil?2:1);level=Math.max(1,1+Math.floor(score/100));updateHud();}
function spawnAsteroid(){const r=Math.random()*18+16+level*1.2;asteroids.push({x:Math.random()*(cw-r*2)+r,y:-r-15,r,speed:Math.random()*1.4+2+level*.3,drift:(Math.random()-.5)*.8,spin:(Math.random()-.5)*.04,angle:Math.random()*Math.PI*2,seed:Math.random()*1000});}
function spawnEnemy(){const e=getElapsedSeconds(),hb=level>=6||e>80?1:0,w=38+Math.random()*12,h=18+Math.random()*6;enemies.push({x:Math.random()*(cw-w*2)+w,y:-h-20,width:w,height:h,speed:1.2+Math.random()*.7+level*.05+e*.004,sway:Math.random()*1.8+.8,phase:Math.random()*Math.PI*2,hp:2+(Math.random()<.35+level*.02?hb:0)});}
function spawnPowerup(){const e=getElapsedSeconds(),pen=Math.min(.22,level*.012+e*.0018),sw=Math.max(.14,.36-pen),bw=Math.max(.16,.34-pen*.8),lw=Math.max(.05,.16-pen*1.1),tot=sw+bw+lw,roll=Math.random()*tot;let type='life';if(roll<sw)type='safe';else if(roll<sw+bw)type='boost';powerups.push({type,x:Math.random()*(cw-32)+16,y:-34,r:16,speed:1.5+Math.random()*.7});}
function burst(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,size:Math.random()*2.5+1,life:Math.random()*25+15,color:c});}
function drawStars(dt){for(const s of stars){s.y+=s.speed*dt;if(s.y>ch+4){s.y=-4;s.x=Math.random()*cw;}ctx.beginPath();ctx.fillStyle='rgba(210,225,255,'+s.a+')';ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}}
function drawNebula(){const g1=ctx.createRadialGradient(cw*.18,ch*.16,15,cw*.18,ch*.16,cw*.3);g1.addColorStop(0,'rgba(84,132,255,.16)');g1.addColorStop(1,'rgba(84,132,255,0)');ctx.fillStyle=g1;ctx.fillRect(0,0,cw,ch);const g2=ctx.createRadialGradient(cw*.82,ch*.24,15,cw*.82,ch*.24,cw*.25);g2.addColorStop(0,'rgba(132,215,255,.1)');g2.addColorStop(1,'rgba(132,215,255,0)');ctx.fillStyle=g2;ctx.fillRect(0,0,cw,ch);}
function drawRocket(){ctx.save();ctx.translate(rocket.x,rocket.y);ctx.shadowColor='rgba(123,194,255,.4)';ctx.shadowBlur=18;ctx.fillStyle='#d8e6ff';ctx.beginPath();ctx.moveTo(0,-rocket.height/2);ctx.lineTo(rocket.width/2,rocket.height/4);ctx.lineTo(0,rocket.height/2);ctx.lineTo(-rocket.width/2,rocket.height/4);ctx.closePath();ctx.fill();ctx.fillStyle='#8cc8ff';ctx.beginPath();ctx.arc(0,-5,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#7b93c9';ctx.beginPath();ctx.moveTo(-rocket.width/2,rocket.height/5);ctx.lineTo(-rocket.width/2-8,rocket.height/2-3);ctx.lineTo(-5,rocket.height/4+6);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(rocket.width/2,rocket.height/5);ctx.lineTo(rocket.width/2+8,rocket.height/2-3);ctx.lineTo(5,rocket.height/4+6);ctx.closePath();ctx.fill();const fl=15+Math.sin(rocket.glow)*6,fg=ctx.createLinearGradient(0,rocket.height/3,0,rocket.height/2+fl);fg.addColorStop(0,'rgba(255,211,111,.9)');fg.addColorStop(1,'rgba(255,110,74,.1)');ctx.fillStyle=fg;ctx.beginPath();ctx.moveTo(-6,rocket.height/3);ctx.quadraticCurveTo(0,rocket.height/2+fl,6,rocket.height/3);ctx.closePath();ctx.fill();ctx.restore();}
function drawEnemy(e){ctx.save();ctx.translate(e.x,e.y);const w=Math.sin(gameTimeMs*.01+e.phase)*2.4;ctx.fillStyle='#5ef090';ctx.beginPath();ctx.ellipse(0,w,e.width/2,e.height/2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#a9ffd2';ctx.beginPath();ctx.ellipse(0,w-e.height*.32,e.width*.22,e.height*.23,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawBullet(b){ctx.save();const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,7);g.addColorStop(0,'rgba(173,240,255,1)');g.addColorStop(1,'rgba(173,240,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,6,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawPowerup(p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(gameTimeMs*.0015);ctx.fillStyle='#37d66b';ctx.beginPath();for(let i=0;i<7;i++){const a=(Math.PI*2/7)*i,v=.82+Math.sin(i*2.3)*.12,px=Math.cos(a)*p.r*v,py=Math.sin(a)*p.r*v;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();ctx.fill();ctx.restore();}
function drawAsteroid(a){ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);ctx.fillStyle='#6f778a';ctx.beginPath();for(let i=0;i<7;i++){const ag=(Math.PI*2/7)*i,v=.8+Math.sin(a.seed+i)*.15,px=Math.cos(ag)*a.r*v,py=Math.sin(ag)*a.r*v;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.stroke();ctx.restore();}
function drawParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt*2.4;p.y+=p.vy*dt*2.4;p.life-=dt*60;if(p.life<=0){particles.splice(i,1);continue;}ctx.save();ctx.globalAlpha=Math.max(0,p.life/50);ctx.fillStyle=p.color.replace('ALPHA',ctx.globalAlpha.toFixed(2));ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();}}
function intersects(a){return Math.hypot(a.x-rocket.x,a.y-(rocket.y+3))<a.r+22;}function intersectsEnemy(e){const rx=rocket.x,ry=rocket.y+3,ex=Math.max(e.x-e.width/2,Math.min(rx,e.x+e.width/2)),ey=Math.max(e.y-e.height/2,Math.min(ry,e.y+e.height/2)),dx=rx-ex,dy=ry-ey;return dx*dx+dy*dy<22*22;}function intersectsPowerup(p){return Math.hypot(p.x-rocket.x,p.y-(rocket.y+3))<p.r+20;}function bulletHitsEnemy(b,e){const ex=Math.max(e.x-e.width/2,Math.min(b.x,e.x+e.width/2)),ey=Math.max(e.y-e.height/2,Math.min(b.y,e.y+e.height/2)),dx=b.x-ex,dy=b.y-ey;return dx*dx+dy*dy<b.r*b.r;}
function fireBullet(){if(!started||gameOver)return;if(gameTimeMs-lastFireTime<180)return;lastFireTime=gameTimeMs;bullets.push({x:rocket.x,y:rocket.y-rocket.height/2+4,vy:-9.8,r:4.2});}
function applyPowerup(type){const e=getElapsedSeconds(),d=Math.max(.45,1-level*.032-e*.0035);if(type==='safe')safeModeUntil=gameTimeMs+Math.max(3500,Math.round(8500*d));else if(type==='boost')scoreBoostUntil=gameTimeMs+Math.max(4000,Math.round(9000*d));else lives=Math.min(6,lives+1);updateHud();}
function updateRocketByMode(){if(controlMode==='phone'){handVisible=true;const tx=pointerActive?pointerX:rocket.x;smoothedTargetX=smoothedTargetX===null?tx:smoothedTargetX+(tx-smoothedTargetX)*.28;rocket.x+=(smoothedTargetX-rocket.x)*.22;rocket.x=Math.max(38,Math.min(cw-38,rocket.x));}}
function tick(time){const dt=Math.min(.04,(time-lastTime)/1000||.016);lastTime=time;gameTimeMs=time;rocket.glow+=dt*12;ctx.clearRect(0,0,cw,ch);drawNebula();drawStars(dt*60);updateRocketByMode();if(controlMode&&((controlMode==='laptop'&&handVisible)||controlMode==='phone')&&!gameOver){started=true;if(!runStartMs)runStartMs=time;hideMessage();}
if(started&&!gameOver){const elapsed=getElapsedSeconds(),difficulty=getDifficultyScale();enemySpawnGap=getEnemySpawnGap();powerupSpawnGap=getPowerupSpawnGap();fireBullet();if(time-lastSpawn>spawnGap){spawnAsteroid();lastSpawn=time;if(spawnGap>320)spawnGap-=5;}if(time-lastEnemySpawn>enemySpawnGap){spawnEnemy();if(Math.random()<Math.min(.58,Math.max(0,(level-3)*.07+elapsed*.01)))spawnEnemy();lastEnemySpawn=time;}if(time-lastPowerupSpawn>powerupSpawnGap){if(Math.random()<Math.max(.35,.86-level*.03-elapsed*.0035))spawnPowerup();lastPowerupSpawn=time;}
for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.y+=b.vy*dt*60;drawBullet(b);if(b.y<-20){bullets.splice(i,1);continue;}let hit=false;for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(!bulletHitsEnemy(b,e))continue;e.hp-=1;bullets.splice(i,1);burst(b.x,b.y,'rgba(173,240,255,ALPHA)',12);if(e.hp<=0){enemies.splice(j,1);burst(e.x,e.y,'rgba(94,240,144,ALPHA)',20);addScore(50);}hit=true;break;}if(hit)continue;}
for(let i=asteroids.length-1;i>=0;i--){const a=asteroids[i];a.y+=a.speed*difficulty*dt*60;a.x+=a.drift*(.92+difficulty*.08)*dt*60;a.angle+=a.spin;drawAsteroid(a);if(intersects(a)){burst(a.x,a.y,'rgba(255,139,106,ALPHA)',20);asteroids.splice(i,1);if(gameTimeMs<safeModeUntil)addScore(5);else{lives-=1;updateHud();if(lives<=0){gameOver=true;statusEl.textContent='Destroyed';setMusicActive(false);showMessage('Mission failed','Hit by too many asteroids. Tap Restart to try again.');}}continue;}if(a.y-a.r>ch+15){asteroids.splice(i,1);addScore(10);burst(a.x,ch-15,'rgba(123,194,255,ALPHA)',6);}}
for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.y+=e.speed*(.95+difficulty*.12)*dt*60;e.x+=Math.sin(time*.003+e.phase)*e.sway;e.x=Math.max(e.width/2+10,Math.min(cw-e.width/2-10,e.x));drawEnemy(e);if(intersectsEnemy(e)){burst(e.x,e.y,'rgba(94,240,144,ALPHA)',18);enemies.splice(i,1);if(gameTimeMs<safeModeUntil)addScore(12);else{lives-=1;updateHud();if(lives<=0){gameOver=true;statusEl.textContent='Destroyed';setMusicActive(false);showMessage('Mission failed','Alien fleet overwhelmed you. Tap Restart to try again.');}}continue;}if(e.y-e.height/2>ch+22)enemies.splice(i,1);}
for(let i=powerups.length-1;i>=0;i--){const p=powerups[i];p.y+=p.speed*dt*60;drawPowerup(p);if(intersectsPowerup(p)){const t=p.type;powerups.splice(i,1);burst(p.x,p.y,'rgba(100,255,150,ALPHA)',18);applyPowerup(t);continue;}if(p.y-p.r>ch+20)powerups.splice(i,1);}}
 drawRocket();drawParticles(dt);setMusicActive(started&&!gameOver);if(!started&&controlMode==='laptop'&&!handVisible&&!gameOver)showMessage('Show your hand','Extend index finger to control rocket.');if(!started&&controlMode==='phone'&&!gameOver)showMessage('Touch to move','Drag to steer rocket.');requestAnimationFrame(tick);}
function updateRocketFromHand(results){if(controlMode!=='laptop')return;if(!results.multiHandLandmarks||!results.multiHandLandmarks.length){handVisible=false;updateHud();return;}const indexTip=results.multiHandLandmarks[0][8];handVisible=true;const tx=(1-indexTip.x)*cw;if(smoothedTargetX===null)smoothedTargetX=tx;smoothedTargetX+=(tx-smoothedTargetX)*.28;rocket.x+=(smoothedTargetX-rocket.x)*.22;rocket.x=Math.max(38,Math.min(cw-38,rocket.x));updateHud();}
async function startLaptopTracking(){if(!hands){hands=new Hands({locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.6,minTrackingConfidence:.6});hands.onResults(updateRocketFromHand);}if(!camera){camera=new Camera(vid,{onFrame:async()=>{if(controlMode==='laptop')await hands.send({image:vid});},width:640,height:480});}vid.style.display='block';await camera.start();}
function resetGame(){score=0;lives=3;level=1;gameOver=false;started=false;handVisible=false;asteroids=[];enemies=[];bullets=[];powerups=[];particles=[];spawnGap=950;enemySpawnGap=2600;powerupSpawnGap=9800;lastSpawn=0;lastEnemySpawn=0;lastPowerupSpawn=0;lastFireTime=0;gameTimeMs=0;runStartMs=0;safeModeUntil=0;scoreBoostUntil=0;rocket.x=cw/2;rocket.y=ch-100;updateHud();if(controlMode==='laptop')showMessage('Show your hand','Extend index finger to control rocket. Auto-fire is active.');else showMessage('Touch to move','Drag left/right to move rocket. Auto-fire is active.');setMusicActive(false);}
async function switchMode(mode){controlMode=mode;modePicker.style.display='none';modeEl.textContent=mode==='phone'?'Phone':'Laptop';if(mode==='phone'){if(camera)camera.stop();vid.style.display='none';handVisible=true;}else{try{await startLaptopTracking();}catch(_e){showMessage('Camera blocked','Allow camera access and choose Laptop mode again.');controlMode=null;modePicker.style.display='flex';modeEl.textContent='None';return;}}resetGame();}
restartBtn.addEventListener('click',resetGame);musicBtn.addEventListener('click',toggleMusic);fullscreenBtn.addEventListener('click',()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});});homeBtn.addEventListener('click',()=>{location.href='index.html';});phoneModeBtn.addEventListener('click',()=>{switchMode('phone');});laptopModeBtn.addEventListener('click',()=>{switchMode('laptop');});
addEventListener('pointerdown',e=>{if(controlMode!=='phone')return;pointerActive=true;pointerX=e.clientX;if(!started)hideMessage();},{passive:true});addEventListener('pointermove',e=>{if(controlMode!=='phone'||!pointerActive)return;pointerX=e.clientX;},{passive:true});addEventListener('pointerup',()=>{pointerActive=false;},{passive:true});addEventListener('pointercancel',()=>{pointerActive=false;},{passive:true});addEventListener('resize',resize);
resize();updateMusicButton();updateHud();requestAnimationFrame(tick);
</script>
