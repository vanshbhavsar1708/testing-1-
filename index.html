<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>rocket-guard</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --font-display: 'Cabinet Grotesk', 'Inter', sans-serif;
      --font-body: 'Satoshi', 'Inter', sans-serif;
      --text-xs: clamp(0.7rem, 2.8vw, 0.8rem);
      --text-sm: clamp(0.8rem, 3.2vw, 0.9rem);
      --text-base: clamp(0.9rem, 3.6vw, 1rem);
      --text-lg: clamp(1rem, 4vw, 1.2rem);
      --text-xl: clamp(1.2rem, 4.8vw, 1.6rem);
      --space-2: clamp(0.4rem, 1.6vw, 0.5rem);
      --space-3: clamp(0.6rem, 2.4vw, 0.75rem);
      --space-4: clamp(0.8rem, 3.2vw, 1rem);
      --space-5: clamp(1rem, 4vw, 1.25rem);
      --space-6: clamp(1.2rem, 4.8vw, 1.5rem);
      --space-8: clamp(1.6rem, 6.4vw, 2rem);
      --radius-md: 0.4rem;
      --radius-lg: 0.6rem;
      --radius-xl: 0.8rem;
      --radius-full: 9999px;
      --color-bg: #050814;
      --color-surface: rgba(10, 18, 34, 0.72);
      --color-surface-2: rgba(19, 30, 54, 0.76);
      --color-border: rgba(128, 181, 255, 0.18);
      --color-text: #eef4ff;
      --color-text-muted: #9fb4d8;
      --color-primary: #7bc2ff;
      --color-danger: #ff8b6a;
      --color-gold: #ffd36f;
      --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.4);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      margin: 0; 
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      overflow: hidden;
      background: radial-gradient(circle at top, rgba(68, 122, 255, 0.12), transparent 35%), #050814;
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 16px; /* Prevents zoom on iOS */
      line-height: 1.4;
    }

    video {
      position: absolute;
      right: clamp(0.75rem, 3vw, 1rem);
      bottom: clamp(0.75rem, 3vw, 1rem);
      width: clamp(160px, 32vw, 200px);
      height: clamp(90px, 18vw, 112.5px);
      object-fit: cover;
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-lg);
      transform: scaleX(-1);
      z-index: 3;
      opacity: 0.85;
      background: #0b1224;
    }

    #game {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(var(--space-3), 4vw, var(--space-5));
      gap: var(--space-3);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .panel {
      pointer-events: auto;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(18px);
      padding: var(--space-4);
    }

    .brand { 
      padding: var(--space-4) var(--space-4); 
      max-width: 100%; 
      flex: 1 1 100%;
    }
    
    .eyebrow {
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: var(--text-xs);
      margin-bottom: var(--space-2);
    }
    
    h1 {
      margin: 0 0 var(--space-2) 0;
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 5.6vw, 1.8rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    
    .meta { 
      margin: 0; 
      color: var(--color-text-muted); 
      font-size: var(--text-sm); 
      line-height: 1.45;
      max-width: 100ch;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-2);
      padding: var(--space-3);
      min-width: 100%;
    }
    
    .stat {
      padding: var(--space-2) var(--space-3);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    
    .label { 
      color: var(--color-text-muted); 
      font-size: var(--text-xs); 
      text-transform: uppercase; 
      letter-spacing: 0.1em;
      margin-bottom: 0.1rem;
    }
    
    .value { 
      margin-top: 0; 
      font-size: clamp(1.1rem, 4.4vw, 1.3rem); 
      font-weight: 700; 
      font-variant-numeric: tabular-nums;
      min-height: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .guide {
      padding: var(--space-3) var(--space-4);
      max-width: 100%;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      line-height: 1.5;
      flex: 1 1 100%;
    }
    
    .guide strong { color: var(--color-text); }

    .actions { 
      display: flex; 
      gap: var(--space-2); 
      flex-wrap: wrap; 
      padding: var(--space-3);
      justify-content: center;
    }
    
    button {
      pointer-events: auto;
      min-height: 48px;
      padding: 0.9rem 1.2rem;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      color: var(--color-text);
      font: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      flex: 1;
      min-width: 140px;
      max-width: 200px;
      touch-action: manipulation;
    }
    
    button:active {
      transform: translateY(0) scale(0.96);
    }
    
    button:hover:not(:active), button:focus-visible {
      outline: none;
      transform: translateY(-1px);
      background: rgba(123, 194, 255, 0.16);
      border-color: rgba(123, 194, 255, 0.3);
    }
    
    .primary { 
      background: var(--color-primary); 
      color: #04101f; 
      border-color: transparent; 
      font-weight: 700; 
    }
    
    .primary:active { 
      background: #98d2ff; 
      transform: scale(0.96);
    }

    .centerMessage {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      text-align: center;
      background: rgba(8, 14, 28, 0.85);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: clamp(1rem, 4vw, 1.25rem) clamp(1.2rem, 4.8vw, 1.4rem);
      max-width: min(90vw, 28rem);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px);
      margin: 1rem;
    }
    
    .centerMessage[hidden] { display: none; }
    
    .centerMessage h2 { 
      margin: 0 0 var(--space-3) 0; 
      font-family: var(--font-display); 
      font-size: clamp(1.4rem, 5.6vw, 2rem); 
      line-height: 1.1;
    }
    
    .centerMessage p { 
      margin: 0; 
      color: var(--color-text-muted); 
      font-size: var(--text-base);
      line-height: 1.45;
    }

    /* Mobile-first responsive breakpoints */
    @media (min-width: 480px) {
      .hud {
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-3);
      }
      
      .row {
        gap: var(--space-4);
      }
      
      .brand {
        flex: 1 1 55%;
        max-width: 36rem;
      }
      
      .actions {
        justify-content: flex-end;
      }
      
      button {
        flex: 0 0 auto;
        min-width: 160px;
      }
    }

    @media (min-width: 768px) {
      .hud {
        min-width: 28rem;
      }
      
      video {
        width: min(220px, 24vw);
        height: min(123.75px, 13.5vw);
      }
    }

    @media (max-width: 400px) {
      .overlay {
        padding: var(--space-3);
      }
      
      video {
        width: 36vw;
        right: 0.5rem;
        bottom: 0.5rem;
      }
      
      .panel {
        padding: var(--space-3);
      }
    }

    /* Landscape adjustments */
    @media (max-height: 500px) and (orientation: landscape) {
      .overlay {
        padding: var(--space-2);
        gap: var(--space-2);
      }
      
      .brand, .guide {
        display: none;
      }
      
      .hud {
        grid-template-columns: repeat(2, 1fr);
        padding: var(--space-2);
      }
      
      video {
        width: 28vw;
      }
    }

    /* Safe area insets for notched phones */
    @supports (padding: max(0px)) {
      body {
        padding-bottom: env(safe-area-inset-bottom);
        padding-top: env(safe-area-inset-top);
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <video id="vid" playsinline muted></video>

  <div class="overlay">
    <div class="row">
      <section class="panel brand">
        <div class="eyebrow">Hand-controlled defense</div>
        <h1>ROCKET GUARD</h1>
        <p class="meta">Move your index finger left and right. The rocket follows automatically. Survive the asteroid field!</p>
      </section>

      <section class="panel hud" aria-label="Game stats">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
        <div class="stat"><div class="label">Level</div><div class="value" id="level">1</div></div>
        <div class="stat"><div class="label">Status</div><div class="value" id="status">Scanning</div></div>
      </section>
    </div>

    <div class="row">
     
      <section class="panel actions">
        <button id="restartBtn" class="primary" type="button">Restart</button>
      </section>
    </div>
  </div>

  <div id="message" class="centerMessage">
    <h2>Show your hand</h2>
    <p>Extend index finger to start flying. Move left/right to steer rocket.</p>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const vid = document.getElementById('vid');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const restartBtn = document.getElementById('restartBtn');

    let cw = 0;
    let ch = 0;
    let score = 0;
    let lives = 3;
    let level = 1;
    let gameOver = false;
    let started = false;
    let handVisible = false;
    let smoothedTargetX = null;
    let stars = [];
    let particles = [];
    let asteroids = [];
    let lastSpawn = 0;
    let spawnGap = 950;
    let lastTime = 0;

    const rocket = {
      x: 0,
      y: 0,
      width: 40,  // Slightly smaller for mobile
      height: 65,
      glow: 0
    };

    function resize() {
      cw = canvas.width = window.innerWidth;
      ch = canvas.height = window.innerHeight;
      
      // More stars for mobile screens
      if (!stars.length) {
        for (let i = 0; i < 120; i++) {
          stars.push({ 
            x: Math.random() * cw, 
            y: Math.random() * ch, 
            r: Math.random() * 1.6 + 0.3, 
            speed: Math.random() * 16 + 8, 
            a: Math.random() * 0.7 + 0.2 
          });
        }
      }
      
      rocket.x = cw / 2;
      rocket.y = ch - 100;  // Slightly higher on mobile
    }

    function resetGame() {
      score = 0;
      lives = 3;
      level = 1;
      gameOver = false;
      started = false;
      asteroids = [];
      particles = [];
      spawnGap = 950;
      lastSpawn = 0;
      rocket.x = cw / 2;
      rocket.y = ch - 100;
      updateHud();
      showMessage('Show your hand', 'Extend index finger to start. Move left/right to steer.');
    }

    function updateHud() {
      scoreEl.textContent = String(score);
      livesEl.textContent = String(lives);
      levelEl.textContent = String(level);
      statusEl.textContent = gameOver ? 'Destroyed' : handVisible ? 'Tracking' : 'Scanning';
    }

    function showMessage(title, text) {
      messageEl.hidden = false;
      messageEl.innerHTML = '<h2>' + title + '</h2><p>' + text + '</p>';
    }

    function hideMessage() {
      if (!gameOver && started) messageEl.hidden = true;
    }

    function spawnAsteroid() {
      const radius = Math.random() * 18 + 16 + level * 1.2;  // Slightly smaller
      asteroids.push({
        x: Math.random() * (cw - radius * 2) + radius,
        y: -radius - 15,
        r: radius,
        speed: Math.random() * 1.4 + 2 + level * 0.3,
        drift: (Math.random() - 0.5) * 0.8,
        spin: (Math.random() - 0.5) * 0.04,
        angle: Math.random() * Math.PI * 2,
        seed: Math.random() * 1000
      });
    }

        function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4,
          size: Math.random() * 2.5 + 1,
          life: Math.random() * 25 + 15,
          color
        });
      }
    }

    function drawStars(dt) {
      for (const star of stars) {
        star.y += star.speed * dt;
        if (star.y > ch + 4) {
          star.y = -4;
          star.x = Math.random() * cw;
        }
        ctx.beginPath();
        ctx.fillStyle = 'rgba(210,225,255,' + star.a + ')';
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawNebula() {
      const g1 = ctx.createRadialGradient(cw * 0.18, ch * 0.16, 15, cw * 0.18, ch * 0.16, cw * 0.3);
      g1.addColorStop(0, 'rgba(84, 132, 255, 0.16)');
      g1.addColorStop(1, 'rgba(84, 132, 255, 0)');
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, cw, ch);
      
      const g2 = ctx.createRadialGradient(cw * 0.82, ch * 0.24, 15, cw * 0.82, ch * 0.24, cw * 0.25);
      g2.addColorStop(0, 'rgba(132, 215, 255, 0.1)');
      g2.addColorStop(1, 'rgba(132, 215, 255, 0)');
      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, cw, ch);
    }

    function drawRocket() {
      ctx.save();
      ctx.translate(rocket.x, rocket.y);
      ctx.shadowColor = 'rgba(123, 194, 255, 0.4)';
      ctx.shadowBlur = 18;
      
      ctx.fillStyle = '#d8e6ff';
      ctx.beginPath();
      ctx.moveTo(0, -rocket.height / 2);
      ctx.lineTo(rocket.width / 2, rocket.height / 4);
      ctx.lineTo(0, rocket.height / 2);
      ctx.lineTo(-rocket.width / 2, rocket.height / 4);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#8cc8ff';
      ctx.beginPath();
      ctx.arc(0, -5, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#7b93c9';
      ctx.beginPath();
      ctx.moveTo(-rocket.width / 2, rocket.height / 5);
      ctx.lineTo(-rocket.width / 2 - 8, rocket.height / 2 - 3);
      ctx.lineTo(-5, rocket.height / 4 + 6);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(rocket.width / 2, rocket.height / 5);
      ctx.lineTo(rocket.width / 2 + 8, rocket.height / 2 - 3);
      ctx.lineTo(5, rocket.height / 4 + 6);
      ctx.closePath();
      ctx.fill();

      const flameLen = 15 + Math.sin(rocket.glow) * 6;
      const flame = ctx.createLinearGradient(0, rocket.height / 3, 0, rocket.height / 2 + flameLen);
      flame.addColorStop(0, 'rgba(255, 211, 111, 0.9)');
      flame.addColorStop(1, 'rgba(255, 110, 74, 0.1)');
      ctx.fillStyle = flame;
      ctx.beginPath();
      ctx.moveTo(-6, rocket.height / 3);
      ctx.quadraticCurveTo(0, rocket.height / 2 + flameLen, 6, rocket.height / 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawAsteroid(a) {
      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(a.angle);
      ctx.fillStyle = '#6f778a';
      ctx.beginPath();
      for (let i = 0; i < 7; i++) {
        const ang = (Math.PI * 2 / 7) * i;
        const variance = 0.8 + Math.sin(a.seed + i) * 0.15;
        const px = Math.cos(ang) * a.r * variance;
        const py = Math.sin(ang) * a.r * variance;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt * 2.4;
        p.y += p.vy * dt * 2.4;
        p.life -= dt * 60;
        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / 50);
        ctx.fillStyle = p.color.replace('ALPHA', ctx.globalAlpha.toFixed(2));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function intersects(a) {
      const rx = rocket.x;
      const ry = rocket.y + 3;
      const dx = a.x - rx;
      const dy = a.y - ry;
      return Math.hypot(dx, dy) < a.r + 22;  // Adjusted for smaller rocket
    }

    function tick(time) {
      const dt = Math.min(0.04, (time - lastTime) / 1000 || 0.016);
      lastTime = time;
      rocket.glow += dt * 12;

      ctx.clearRect(0, 0, cw, ch);
      drawNebula();
      drawStars(dt * 60);

      if (handVisible && !gameOver) {
        started = true;
        hideMessage();
      }

      if (started && !gameOver) {
        if (time - lastSpawn > spawnGap) {
          spawnAsteroid();
          lastSpawn = time;
          if (spawnGap > 320) spawnGap -= 5;
        }

        for (let i = asteroids.length - 1; i >= 0; i--) {
          const a = asteroids[i];
          a.y += a.speed * dt * 60;
          a.x += a.drift * dt * 60;
          a.angle += a.spin;
          drawAsteroid(a);

          if (intersects(a)) {
            burst(a.x, a.y, 'rgba(255,139,106,ALPHA)', 20);
            asteroids.splice(i, 1);
            lives -= 1;
            updateHud();
            if (lives <= 0) {
              gameOver = true;
              statusEl.textContent = 'Destroyed';
              showMessage('Mission failed', 'Hit by too many asteroids. Tap Restart to try again.');
            }
            continue;
          }

          if (a.y - a.r > ch + 15) {
            asteroids.splice(i, 1);
            score += 10;
            level = Math.max(1, 1 + Math.floor(score / 100));
            burst(a.x, ch - 15, 'rgba(123,194,255,ALPHA)', 6);
            updateHud();
          }
        }
      }

      drawRocket();
      drawParticles(dt);

      if (!handVisible && !gameOver) {
        showMessage('Show your hand', 'Extend index finger to control rocket.');
      }

      requestAnimationFrame(tick);
    }

    function updateRocketFromHand(results) {
      if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) {
        handVisible = false;
        updateHud();
        return;
      }
      
      const lm = results.multiHandLandmarks[0];
      const indexTip = lm[8];
      handVisible = true;
      
      const targetX = (1 - indexTip.x) * cw;
      if (smoothedTargetX === null) smoothedTargetX = targetX;
      smoothedTargetX += (targetX - smoothedTargetX) * 0.28;  // Slightly more responsive
      rocket.x += (smoothedTargetX - rocket.x) * 0.22;
      rocket.x = Math.max(38, Math.min(cw - 38, rocket.x));  // Adjusted bounds
      updateHud();
    }

    // Prevent zoom on double tap
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      const now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

    restartBtn.addEventListener('click', resetGame);
    window.addEventListener('resize', resize);

    const hands = new Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0,  // Faster on mobile
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults(updateRocketFromHand);

    const camera = new Camera(vid, {
      onFrame: async () => { await hands.send({ image: vid }); },
      width: 640,  // Smaller resolution for mobile performance
      height: 480
    });

    resize();
    resetGame();
    requestAnimationFrame(tick);

    camera.start().catch(() => {
      showMessage('Camera blocked', 'Allow camera access then refresh page.');
      statusEl.textContent = 'Camera off';
    });
  </script>
</body>
</html>
